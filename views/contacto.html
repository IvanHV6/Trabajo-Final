<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autocar</title>

    <!-- Script de cookies (corregido para W3C) -->
    <script src="//cdn.cookie-script.com/s/a1a6fb16852d1bf143659b9458e22a6f.js"></script>

    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>

<header>
    <nav>
        <form id="form-buscador">
            <input type="text" id="buscador" placeholder="Buscar..." name="buscar">
            <button type="submit" id="boton">Enviar</button>
        </form>

        <img src="../favicon.png" alt="Logotipo AUTOCAR" id="logonav">

        <div class="hamburguesa" id="hamburguesa" aria-label="Abrir menú">☰</div>

        <ul class="menunav">
            <li class="menunav2"><a href="../index.html" class="no-cambia">Inicio</a></li>
            <li class="menunav2"><a href="productos.html" class="no-cambia">Nuestros Vehículos</a></li>
            <li class="menunav2"><a href="ofertas.html" class="no-cambia">Ofertas</a></li>
            <li class="menunav2"><a href="contacto.html" class="cambia">Contacto</a></li>
        </ul>
    </nav>
</header>

<main class="contacto-main">

    <div class="form-ubicacion-container">

        <!-- FORMULARIO DE CONTACTO -->
        <form class="form-contacto">
            <h2 class="contacta">¡Contáctanos!</h2>

            <label for="Nombre">Nombre:</label>
            <input type="text" id="Nombre" name="Nombre">

            <label for="Apellidos">Apellidos:</label>
            <input type="text" id="Apellidos" name="Apellidos">

            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" name="email">

            <label for="telefono">Teléfono:</label>
            <input type="tel" id="telefono" name="telefono">

            <!-- CORREGIDO: el label ahora apunta al id correcto -->
            <label for="mensaje">Mensaje:</label>
            <textarea id="mensaje" name="mensaje"></textarea>

            <button type="submit">Enviar</button>
        </form>

        <!-- MAPA -->
        <section class="ubicacion">
            <h2>PUEDES ENCONTRARNOS EN:</h2>

            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3062.4137721481748!2d-4.030946723435512!3d39.86496867153368!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xd6a0ba9f950fca3%3A0xc0d3e26753956c79!2sAv.%20de%20la%20Reconquista%2C%201%2C%2045004%20Toledo%2C%20Spain!5e0!3m2!1sen!2sus!4v1737663969437!5m2!1sen!2sus"
                width="600"
                height="450"
                style="border:0;"
                allowfullscreen=""
                loading="lazy"
                referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </section>

    </div>
</main>

<footer>
    <div class="redessociales">
        <a href="#"><img src="../assets/redes-sociales/logox.png" alt="Cuenta X" class="redsocial"></a>
        <a href="#"><img src="../assets/redes-sociales/logo_facebook.png" alt="Cuenta Facebook" class="redsocial"></a>
        <a href="#"><img src="../assets/redes-sociales/logo_instagram.png" alt="Cuenta Instagram" class="redsocial"></a>
    </div>

    <div class="flex">
        <p class="creditos">Página Web creada por: Iván Hernández Vegue</p>
        <p class="creditos">&copy;2025 AUTOCAR - Su concesionario profesional</p>
        <p class="creditos">&#174; AUTOCAR ES UNA MARCA REGISTRADA</p>
    </div>
</footer>

<script>
    const btn = document.getElementById("hamburguesa");
    const menu = document.querySelector(".menunav");

    btn.addEventListener("click", () => {
        menu.classList.toggle("activo");
    });
</script>

</body>
</html>
